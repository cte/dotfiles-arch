source = $HOME/.config/hypr/mocha.conf

$accent = $mauve
$accentAlpha = $mauveAlpha
$font = Geist

general {
    hide_cursor = true
    grace = 2
}

auth {
    pam:enabled = true
    pam:module = hyprlock
    fingerprint:enabled = true
    fingerprint:ready_message = Touch fingerprint sensor
    fingerprint:present_message = Reading fingerprint...
    fingerprint:retry_delay = 250
}

background {
    monitor =
    path = /home/cte/Dropbox/Personal/Backgrounds/catppuccin-3d-model.jpg
    blur_passes = 0
    blur_size = 0
    noise = 0.01
    contrast = 0.95
    brightness = 0.80
    vibrancy = 0.15
    vibrancy_darkness = 0.20
}

shape {
    monitor =
    size = 520, 268
    color = rgba(00000000)
    rounding = 12
    border_size = 0
    shadow_passes = 0
    position = 0, 134
    halign = center
    valign = bottom
    zindex = 0
}

label {
    monitor =
    text = cmd[update:60000] sh -c 'printf "%s" "$(date +%-I:%M\ %p | tr A-Z a-z)"'
    color = $text
    font_size = 60
    font_family = Overpass
    position = 0, 218
    halign = center
    valign = bottom
    zindex = 1
}

label {
    monitor =
    text = cmd[update:43200000] date +"%A, %d %B %Y"
    color = $subtext1
    font_size = 14
    font_family = $font
    position = 0, 174
    halign = center
    valign = bottom
    zindex = 1
}

label {
    monitor =
    text = $FPRINTPROMPT
    color = $subtext1
    font_size = 14
    font_family = $font
    position = 0, 34
    halign = center
    valign = bottom
    zindex = 1
}

input-field {
    monitor =
    size = 300, 60
    outline_thickness = 3
    dots_size = 0.2
    dots_spacing = 0.2
    dots_center = true
    outer_color = rgba($mauveAlpha88) rgba($blueAlpha88) 45deg
    inner_color = $surface0
    font_color = $text
    fade_on_empty = false
    font_family = $font
    check_color = $accent
    fail_color = $red
    capslock_color = $yellow
    placeholder_text = <span foreground="##$textAlpha"><i>󰌾 Unlock</i></span>
    hide_input = false
    position = 0, 90
    halign = center
    valign = bottom
    zindex = 1
}
