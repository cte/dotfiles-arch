[Settings]
folder = ~/Dropbox/Personal/Backgrounds
backend = hyprpaper
fill = fill
monitors = All
wallpaper = ~/Dropbox/Personal/Backgrounds/catppuccin-3d-model.jpg
subfolders = False
all_subfolders = False
show_hidden = False
show_gifs_only = False
zen_mode = False
post_command = ~/.config/hypr/sync-wallpaper-state.sh "$wallpaper"
number_of_columns = 4
show_path_in_tooltip = True
use_xdg_state = False
language = en
sort = name
color = #ffffff
swww_transition_type = any
swww_transition_step = 63
swww_transition_angle = 0
swww_transition_duration = 2
swww_transition_fps = 60
mpvpaper_sound = False
mpvpaper_options = 
stylesheet = /home/cte/.config/waypaper/style.css
keybindings = ~/.config/waypaper/keybindings.ini

